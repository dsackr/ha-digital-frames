send_image:
  name: Send Image
  description: Convert and send an image to a Fraimic e-ink frame.
  fields:
    device_id:
      name: Frame
      description: The Fraimic frame to send the image to.
      required: true
      selector:
        device:
          integration: fraimic
    media_content_id:
      name: Image
      description: Image to send (select from your media library).
      required: true
      selector:
        media:
          accept:
            - image/jpeg
            - image/png
            - image/gif
            - image/webp
            - image/bmp
            - image/tiff

restart:
  name: Restart Frame
  description: Restart a Fraimic frame.
  fields:
    device_id:
      name: Frame
      description: The Fraimic frame to restart.
      required: true
      selector:
        device:
          integration: fraimic

sleep:
  name: Sleep Frame
  description: >-
    Put a frame to sleep. Fraimic Spectra → deep sleep; Meural Canvas →
    suspend display (local backlight off / sleep).
  fields:
    device_id:
      name: Frame
      description: The frame to put to sleep.
      required: true
      selector:
        device:
          integration: fraimic

wake:
  name: Wake Frame
  description: >-
    Wake a Meural Canvas from display suspend (local resume). Not used by
    Fraimic Spectra frames (they wake on their own schedule).
  fields:
    device_id:
      name: Frame
      description: The Meural frame to wake.
      required: true
      selector:
        device:
          integration: fraimic

refresh:
  name: Refresh Display
  description: Trigger a display refresh on a Fraimic frame.
  fields:
    device_id:
      name: Frame
      description: The Fraimic frame to refresh.
      required: true
      selector:
        device:
          integration: fraimic

generate_ai_image:
  name: Generate AI Image
  description: Generate an AI image from a text prompt and send it to a Fraimic frame. The image is uploaded to your configured library backend (tagged into the "GenAI" album) exactly like a manual upload, then sent.
  fields:
    device_id:
      name: Frame
      description: The Fraimic frame to send the generated image to.
      required: true
      selector:
        device:
          integration: fraimic
    prompt:
      name: Prompt
      description: Description of the image to generate.
      required: true
      selector:
        text:
    ai_task_entity_id:
      name: AI Task entity
      description: Which AI Task entity to generate with. Defaults to the first configured entity that supports image generation.
      required: false
      selector:
        entity:
          filter:
            - domain: ai_task

send_scene:
  name: Send Scene
  description: Send a Fraimic scene's mapped images to their assigned frames all at once.
  fields:
    name:
      name: Scene
      description: The name of the scene to send (set up in the Fraimic panel's Scenes section).
      required: true
      selector:
        text:

send_skill:
  name: Send Skill
  description: Render a Fraimic skill (e.g. Word of the Day) fresh and send it to a frame -- no prior mapping between the skill and the frame required.
  fields:
    device_id:
      name: Frame
      description: The Fraimic frame to send the skill to.
      required: true
      selector:
        device:
          integration: fraimic
    skill_id:
      name: Skill
      description: The skill to render and send (set up in the Fraimic panel's Daily Content section).
      required: true
      selector:
        text:

auto_tag_all:
  name: Auto-tag All Images
  description: Scan the Fraimic image library and queue AI auto-tagging for images. By default, only scans images that do not have any tags yet.
  fields:
    overwrite:
      name: Overwrite existing tags
      description: Whether to re-tag images that already have tags.
      required: false
      default: false
      selector:
        boolean:
