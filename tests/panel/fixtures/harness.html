<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>fraimic-panel test harness</title></head>
<body style="margin:0;padding:0;">
  <fraimic-panel id="panel"></fraimic-panel>
  <script src="/fraimic-panel.js"></script>
  <script>
    // A faithful-enough stand-in for the real `hass` object HA injects into
    // every custom panel/card. `states` MUST be present -- fraimic-panel.js
    // reads hass.states[entityId] directly (e.g. for orientation selects),
    // and a real hass object always has it. Omitting it previously masked
    // an unrelated bug from showing up in tests and made init abort silently
    // partway through (see tests/panel/README.md).
    window.__buildMockHass = function (frames) {
      const states = {};
      const entities = [];
      for (const f of frames) {
        const batteryId = `sensor.${f.entry_id}_battery`;
        const orientationId = `select.${f.entry_id}_orientation`;
        states[batteryId] = { state: '90', attributes: {} };
        states[orientationId] = { state: 'auto', attributes: { options: ['auto', 'portrait', 'landscape'] } };
        entities.push(
          { device_id: f.entry_id, unique_id: `${f.entry_id}_battery`, entity_id: batteryId },
          { device_id: f.entry_id, unique_id: `${f.entry_id}_orientation`, entity_id: orientationId },
        );
      }
      window.__serviceCalls = [];
      window.__wsCalls = [];          // every callWS message, for assertions
      window.__flowSubCallback = null; // config_entries/flow/subscribe sink -- tests push events here
      window.__mockFlowProgress = window.__mockFlowProgress || [];
      const hass = {
        auth: { data: { access_token: 'test-token' } },
        states,
        user: { is_admin: true },
        language: 'en',
        connection: {
          subscribeMessage: async (cb, msg) => {
            if (msg.type === 'config_entries/flow/subscribe') {
              window.__flowSubCallback = cb;
              // Mirror real HA: the subscription opens with a burst of the
              // currently in-progress flows.
              if (window.__mockFlowProgress.length) {
                cb(window.__mockFlowProgress.map((flow) => ({ flow_id: flow.flow_id, flow })));
              }
              return () => { window.__flowSubCallback = null; };
            }
            throw new Error(`unmocked subscription: ${msg.type}`);
          },
        },
        callWS: async (msg) => {
          window.__wsCalls.push(msg);
          if (msg.type === 'config_entries/get') {
            return frames.map((f) => ({ entry_id: f.entry_id, title: f.title }));
          }
          if (msg.type === 'config/device_registry/list') {
            return frames.map((f) => ({ id: f.entry_id, config_entries: [f.entry_id] }));
          }
          if (msg.type === 'config/entity_registry/list') {
            return entities;
          }
          if (msg.type === 'frontend/get_translations') {
            // Empty on purpose: specs assert the renderer's raw-name
            // fallback, which is also what a translation outage produces.
            return { resources: {} };
          }
          if (msg.type === 'config_entries/flow/progress') {
            return window.__mockFlowProgress;
          }
          if (msg.type === 'config_entries/update') {
            return { require_restart: false };
          }
          return [];
        },
        // Real HA re-renders states on the next hass= assignment after a
        // service call resolves; this harness just mutates the shared
        // states object in place, which the panel reads live off
        // hass.states[entityId] with no extra plumbing needed.
        callService: async (domain, service, data) => {
          window.__serviceCalls.push({ domain, service, data });
          if (domain === 'select' && service === 'select_option' && states[data.entity_id]) {
            states[data.entity_id].state = data.option;
          }
        },
      };
      return hass;
    };
  </script>
</body>
</html>
