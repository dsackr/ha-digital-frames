name: Panel browser tests

# fraimic-panel.js bugs tend to be invisible to code review -- e.g. a
# top-level `const CSS` shadowing the global CSS object, or a full
# thumbnail-cache wipe that only reads as broken under real network
# latency -- because they only show up once real pointer/DOM events fire in
# an actual browser. tests/panel/ drives the real panel JS with Playwright
# against a mocked Fraimic HTTP API; see tests/panel/README.md. The suite
# also covers the Lovelace card (fraimic-card.js) via its own harness
# (tests/panel/fixtures/card-harness.html + fraimic-card.spec.js).
#
# Scoped to changes under the two frontend bundles or tests/panel/ so
# unrelated commits (e.g. docs, other integration files) don't pay for a
# browser install.
#
# On pushes to main, the outcome is also appended to docs/TEST_LEDGER.md
# (the durable in-repo record) -- see that file's header. The record
# commit carries [skip ci] so it never triggers another round of
# workflows.

on:
  push:
    branches: [main]
    paths:
      - 'custom_components/fraimic/fraimic-panel.js'
      - 'custom_components/fraimic/fraimic-card.js'
      - 'tests/panel/**'
  pull_request:
    branches: [main]
    paths:
      - 'custom_components/fraimic/fraimic-panel.js'
      - 'custom_components/fraimic/fraimic-card.js'
      - 'tests/panel/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ledger record commit (push runs only)
    defaults:
      run:
        working-directory: tests/panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        shell: bash
        run: npx playwright test | tee playwright-output.txt
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/panel/playwright-report/
          retention-days: 7
      - name: Record result in the test ledger
        # always(): a failed run is exactly what the ledger must not lose.
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        working-directory: .
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          detail=$(grep -E '^[[:space:]]*[0-9]+ (passed|failed|flaky|skipped)' tests/panel/playwright-output.txt | xargs | sed 's/ (.*)//' || echo 'no summary captured')
          [ -n "$detail" ] || detail='no summary captured'
          row="| $(date -u +%F) | ${GITHUB_SHA::7} | panel-playwright | ${JOB_STATUS} | ${detail} | — | CI |"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Re-fetch + re-append per attempt (never rebase a stale append):
          # this step races the version-bump workflow and python-tests' own
          # record step, and two same-file-end appends never rebase
          # cleanly.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git checkout -B main origin/main
            printf '%s\n' "$row" >> docs/TEST_LEDGER.md
            git add docs/TEST_LEDGER.md
            git commit -m "Record panel-playwright result for ${GITHUB_SHA::7} [skip ci]"
            if git push origin main; then
              exit 0
            fi
            git reset --hard origin/main
            sleep $((attempt * 3))
          done
          echo "::warning::could not record test-ledger row after 5 attempts"
